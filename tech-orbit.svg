  <text class="label" x="660.0" y="219.0" text-anchor="middle">HTML</text><text class="label" x="627.1" y="286.9" text-anchor="middle">JavaScript</text><text class="label" x="480.0" y="328.0" text-anchor="middle">TypeScript</text><text class="label" x="332.9" y="271.0" text-anchor="middle">SCSS</text><text class="label" x="300.0" y="213.0" text-anchor="middle">CSS</text><text class="label" x="332.9" y="135.2" text-anchor="middle">Go</text><text class="label" x="480.0" y="131.0" text-anchor="middle">Sass</text><text class="label" x="627.1" y="144.1" text-anchor="middle">Java</text>
